title: "Microsoft Copilot Agentic Blog"
description: "Microsoft Copilot 에이전트 생태계 — 실무 가이드, 핸즈온 워크샵, 기술 업데이트를 한곳에서"
baseurl: "/Agent_Blog"
url: ""
markdown: kramdown
kramdown:
  input: GFM
plugins:
  - jekyll-seo-tag

collections:
  chapters:
    output: true
    permalink: /:collection/:name/

defaults:
  - scope:
      path: ""
      type: "chapters"
    values:
      layout: "chapter"
  - scope:
      path: ""
    values:
      layout: "default"

# Sidebar navigation sections
nav_sections:
  - key: guide
    title: "Copilot Studio 실무 가이드"
    icon: "📘"
  - key: workshop
    title: "핸즈온 워크샵"
    icon: "🛠️"
  - key: special
    title: "특별 워크샵"
    icon: "⭐"
  - key: updates
    title: "기술 업데이트"
    icon: "🔔"
